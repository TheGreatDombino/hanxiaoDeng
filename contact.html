<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hanxiao Deng</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav .menu {
      display: flex;
      gap: 20px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 300;
      font-size: 0.9rem;
    }

    h1{
      text-align: center;
      margin-bottom: 20px;
    }

    .menu-toggle {
      display: none;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .symposium-link {
      background: linear-gradient(90deg, #ffffff, #ff7a85, #ffffff);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientMove 3s linear infinite;
      font-weight: 700;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    main {
      flex: 1;
      padding-top: 120px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }

    input, select, textarea {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      background: #ff4d5a;
      border: none;
      color: #fff;
      border-radius: 25px;
      cursor: pointer;
    }

    footer {
      padding: 30px 15px;
      text-align: center;
      background: #000;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* NAV MOBILE */
    @media (max-width: 768px) {
      .menu {
        position: absolute;
        top: 60px;
        right: 0;
        background: #111;
        flex-direction: column;
        width: 200px;
        padding: 20px;
        display: none;
      }

      .menu.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }

    /* =========================
       CONTACT LAYOUT (NEW)
    ========================= */

    .contact-layout {
      width: 100%;
      max-width: 1400px;
      margin: 60px auto 100px;
      padding: 0 60px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(420px, 560px) minmax(220px, 1fr);
      gap: 70px;
      align-items: start;
    }

    .side-image {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      transition: 0.3s ease;
    }

    .side-image:hover {
      transform: translateY(-4px);
    }

    .side-image img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
    }

    .side-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.35),
        rgba(0,0,0,0.05)
      );
      pointer-events: none;
    }

    .photo-label {
      position: absolute;
      bottom: 12px;
      left: 14px;
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      z-index: 2;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .contact-layout {
        grid-template-columns: 1fr;
      }

      form {
        order: 1;
      }

      .side-image {
        order: 2;
      }

      .side-image img {
        height: 280px;
      }
    }

    </style>
  </head>

  <body>

    <nav>
      <div>
        <a href="index.html"><strong>Hanxiao Deng</strong></a>
      </div>

      <div class="menu" id="menu">
        <a href="index.html">Home</a>
        <a href="index.html#music">Music</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Connect</a>
        <a href="symposium.html" target="_blank" class="symposium-link">Symposium</a>
      </div>

      <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </nav>

    <main>

      <h1>Contact</h1>

      <div class="contact-layout">

        <!-- LEFT IMAGE -->
        <div class="side-image">
          <img src="photos/hanxiaoPiano.JPG" alt="Hanxiao Deng playing piano">
        </div>

        <!-- FORM -->
        <form action="https://formspree.io/f/xpqonnpj" method="POST">

          <input type="text" name="name" placeholder="Your Name" required>

          <input type="email" name="email" placeholder="Your Email" required>

          <select name="reason" required>
            <option value="">Reason for Contact</option>
            <option>Sponsor Symposium</option>
            <option>Participate in Symposium</option>
            <option>Lessons with Hanxiao</option>
            <option>Mailing List Signup</option>
            <option>Booking / Performance Inquiry</option>
            <option>Collaboration</option>
            <option>Press / Media</option>
            <option>Other...</option>
          </select>

          <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

          <button type="submit">Send Message</button>

        </form>

        <!-- RIGHT IMAGE -->
        <div class="side-image">
          <img src="photos/HanxiaoBass.jpg" alt="Hanxiao Deng playing bass">
        </div>

      </div>

    </main>

    <footer>
      <p>© 2026 Hanxiao Deng. All Rights Reserved.</p>
    </footer>

    <script>
      function toggleMenu() {
        document.getElementById("menu").classList.toggle("active");
      }
    </script>

  </body>
</html>
